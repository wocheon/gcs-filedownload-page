steps:
  # 1. Docker 이미지 빌드
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build', 
      '-t', 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA', 
      '.'
    ]

  # 2. 이미지 푸시
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'push', 
      'asia-northeast3-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA'
    ]

  # 3. Cloud Run 배포 (공개 액세스 허용 설정 반영)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image'
      - 'asia-northeast3-docker.pkg.dev/$PROJECT_ID/${_REPO_NAME}/${_IMAGE_NAME}:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast3'
      - '--set-env-vars'
      - 'BUCKET_NAME=${_BUCKET_NAME}'
      - '--service-account'
      - '${_SERVICE_ACCOUNT_EMAIL}'
      - '--ingress=all' 
      # --- 수정된 부분: 공개 액세스 허용 ---
      - '--allow-unauthenticated'
      # ------------------------------------
      - '--platform'
      - 'managed'

substitutions:
  _SERVICE_NAME: 'crs-gcs-filedownload-page'
  _REPO_NAME: 'cloud-run-source-deploy'
  _IMAGE_NAME: 'gcs-filedownload-page/crs-gcs-filedownload-page'
  # [주의] 버킷명 앞의 공백을 제거했습니다.
  _BUCKET_NAME: 'gcp-in-ca-test-bucket-wocheon07'
  _SERVICE_ACCOUNT_EMAIL: 'gcs-manage-sa@gcp-in-ca.iam.gserviceaccount.com'

options:
  logging: CLOUD_LOGGING_ONLY